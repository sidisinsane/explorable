# Explorable workflow — runs on every push to main.
#
# Deploys the Explorable library documentation site to GitHub Pages.
# No build step required — files are served directly from the repo root.
#
# Deployed to: https://sidisinsane.github.io/explorable
#
# Prerequisites:
#   - GitHub Pages enabled in repository settings, source: "GitHub Actions"

name: Publish Explorable to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false  # prevent mid-flight deployment leaving pages in a broken state

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
